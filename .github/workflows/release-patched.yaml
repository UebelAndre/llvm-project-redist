name: Release Patched

on:
  push:
    branches: [main]
    paths:
      - "versions/**"
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version to release patches for (e.g. 22.1.4)"
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect affected versions
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.llvm_version }}" ]; then
            VERSIONS="${{ inputs.llvm_version }}"
          else
            VERSIONS=$(git diff --name-only HEAD~1 -- 'versions/' \
              | grep -oP 'versions/\K[^/]+(?=/)' \
              | sort -uV)
          fi

          if [ -z "$VERSIONS" ]; then
            echo "No version directories changed"
            echo "versions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "versions<<EOF" >> "$GITHUB_OUTPUT"
          echo "$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Affected versions: $VERSIONS"

      - name: Validate patches
        if: steps.detect.outputs.versions != ''
        run: python3 scripts/validate_patches.py versions

      - name: Compute next BCR version and dispatch
        if: steps.detect.outputs.versions != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r LLVM_VERSION; do
            [ -z "$LLVM_VERSION" ] && continue

            PATCH_DIR="versions/${LLVM_VERSION}/patches"
            PATCH_COUNT=$(find "$PATCH_DIR" -name '*.patch' 2>/dev/null | wc -l)
            if [ "$PATCH_COUNT" -eq 0 ]; then
              echo "No patches for ${LLVM_VERSION}, skipping"
              continue
            fi

            EXISTING=$(gh api "repos/${{ github.repository }}/releases" \
              --paginate --jq '.[].tag_name' \
              | grep -cP "^llvmorg-${LLVM_VERSION}\\.bcr\\." || true)
            NEXT_BCR=$((EXISTING + 1))

            echo "Dispatching release for ${LLVM_VERSION}.bcr.${NEXT_BCR}"
            gh workflow run release.yml \
              --repo "${{ github.repository }}" \
              -f llvm_tag="llvmorg-${LLVM_VERSION}" \
              -f bcr_version="${NEXT_BCR}"
          done <<< "${{ steps.detect.outputs.versions }}"
