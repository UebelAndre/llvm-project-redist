name: Release

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version (e.g. 20.1.0)"
        required: true
        type: string
      bcr_version:
        description: "BCR patch version (e.g. 1 for .bcr.1). Leave empty for base release."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Parse version
        id: version
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ inputs.llvm_version }}"
          BCR="${{ inputs.bcr_version }}"

          if [ -n "$BCR" ]; then
            VERSION="${LLVM_VERSION}.bcr.${BCR}"
            RELEASE_TAG="llvmorg-${VERSION}"
          else
            VERSION="${LLVM_VERSION}"
            RELEASE_TAG="llvmorg-${LLVM_VERSION}"
          fi

          echo "llvm_version=${LLVM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "bcr_version=${BCR}" >> "$GITHUB_OUTPUT"

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: redist-repo

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Validate patches
        if: steps.version.outputs.bcr_version != ''
        working-directory: redist-repo
        run: bazel run //tools:validate_patches -- versions

      - name: Build redistribution artifact
        id: build
        working-directory: redist-repo
        run: |
          bazel run //tools:build -- \
            --llvm-version "${{ steps.version.outputs.llvm_version }}" \
            --version "${{ steps.version.outputs.version }}" \
            --versions-dir=versions \
            --output-dir=. \
            --metadata-dir "${{ github.workspace }}/metadata"

      - name: Copy per-version presubmit.yml
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ steps.version.outputs.llvm_version }}"
          PRESUBMIT="redist-repo/versions/${LLVM_VERSION}/presubmit.yml"
          if [ ! -f "$PRESUBMIT" ]; then
            echo "ERROR: versions/${LLVM_VERSION}/presubmit.yml is required"
            exit 1
          fi
          cp "$PRESUBMIT" redist-repo/.bcr/presubmit.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.llvm_version }}
          path: |
            redist-repo/llvm-project-${{ steps.version.outputs.version }}.bzl.tar.xz
            metadata/
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Parse version
        id: version
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ inputs.llvm_version }}"
          BCR="${{ inputs.bcr_version }}"

          if [ -n "$BCR" ]; then
            VERSION="${LLVM_VERSION}.bcr.${BCR}"
            RELEASE_TAG="llvmorg-${VERSION}"
          else
            VERSION="${LLVM_VERSION}"
            RELEASE_TAG="llvmorg-${LLVM_VERSION}"
          fi

          echo "llvm_version=$LLVM_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ steps.version.outputs.llvm_version }}

      - name: Copy per-version presubmit.yml
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ steps.version.outputs.llvm_version }}"
          PRESUBMIT="versions/${LLVM_VERSION}/presubmit.yml"
          if [ ! -f "$PRESUBMIT" ]; then
            echo "ERROR: versions/${LLVM_VERSION}/presubmit.yml is required"
            exit 1
          fi
          cp "$PRESUBMIT" .bcr/presubmit.yml

      - name: Commit and tag
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ steps.version.outputs.llvm_version }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          cp metadata/MODULE.bazel MODULE.bazel
          mkdir -p "versions/${LLVM_VERSION}"
          cp metadata/source.sha256 "versions/${LLVM_VERSION}/source.sha256"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MODULE.bazel .bcr/presubmit.yml "versions/${LLVM_VERSION}/source.sha256"
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "Update MODULE.bazel for ${TAG}"
            git push origin HEAD
          fi

          git tag -a "${TAG}" -m "LLVM ${VERSION}"
          git push origin "${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          TARBALL="llvm-project-${VERSION}.bzl.tar.xz"
          LLVM_VERSION="${{ steps.version.outputs.llvm_version }}"

          if [ "$VERSION" != "$LLVM_VERSION" ]; then
            NOTES="Patched LLVM ${LLVM_VERSION} source with Bazel overlay (version ${VERSION}).

          Upstream release: https://github.com/llvm/llvm-project/releases/tag/llvmorg-${LLVM_VERSION}"
          else
            NOTES="Repackaged LLVM ${VERSION} source with Bazel overlay pre-applied.

          Upstream release: https://github.com/llvm/llvm-project/releases/tag/${TAG}"
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "LLVM ${VERSION}" \
            --notes "${NOTES}" \
            --draft \
            "${TARBALL}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "llvm-project-${{ steps.version.outputs.version }}.bzl.tar.xz"

      - name: Finalize release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release edit "${TAG}" \
            --repo "${{ github.repository }}" \
            --draft=false
