name: CI

on:
  pull_request: {}
  push:
    branches: [main]
    paths:
      - "versions/**"
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version to release patches for (e.g. 20.1.0)"
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Validate patches
        run: bazel run //tools:validate_patches -- versions

      - name: Validate presubmit.yml
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'versions/' \
              | grep -oP 'versions/\K[^/]+(?=/)' \
              | sort -uV)
          elif [ -n "${{ inputs.llvm_version }}" ]; then
            VERSIONS="${{ inputs.llvm_version }}"
          else
            VERSIONS=$(git diff --name-only HEAD~1 -- 'versions/' \
              | grep -oP 'versions/\K[^/]+(?=/)' \
              | sort -uV)
          fi
          if [ -z "$VERSIONS" ]; then
            echo "No version directories changed; skipping presubmit validation"
            exit 0
          fi
          while IFS= read -r V; do
            [ -z "$V" ] && continue
            P="versions/${V}/presubmit.yml"
            if [ ! -f "$P" ]; then
              echo "ERROR: missing required $P"
              exit 1
            fi
            bazel run //tools:run_presubmit -- --validate --presubmit "$P"
          done <<< "$VERSIONS"

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'versions/' \
              | grep -oP 'versions/\K[^/]+(?=/)' \
              | sort -uV)
          elif [ -n "${{ inputs.llvm_version }}" ]; then
            VERSIONS="${{ inputs.llvm_version }}"
          else
            VERSIONS=$(git diff --name-only HEAD~1 -- 'versions/' \
              | grep -oP 'versions/\K[^/]+(?=/)' \
              | sort -uV)
          fi

          if [ -z "$VERSIONS" ]; then
            echo "result=[]" >> "$GITHUB_OUTPUT"
            echo "No version directories changed"
            exit 0
          fi

          MATRIX="["
          FIRST=true
          while IFS= read -r V; do
            [ -z "$V" ] && continue
            $FIRST || MATRIX+=","
            FIRST=false

            VERSION_FILE="versions/${V}/version.txt"
            if [ -f "$VERSION_FILE" ]; then
              VERSION=$(tr -d '[:space:]' < "$VERSION_FILE")
            else
              VERSION="${V}"
            fi

            MATRIX+="{\"llvm_version\":\"${V}\",\"version\":\"${VERSION}\"}"
          done <<< "$VERSIONS"
          MATRIX+="]"

          echo "result=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${MATRIX}"

  build:
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: redist-repo

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Build redistribution artifact
        id: build
        working-directory: redist-repo
        run: |
          bazel run //tools:build -- \
            --llvm-version "${{ matrix.llvm_version }}" \
            --version "${{ matrix.version }}" \
            --versions-dir=versions \
            --output-dir=.

      - name: Copy per-version presubmit.yml
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ matrix.llvm_version }}"
          PRESUBMIT="redist-repo/versions/${LLVM_VERSION}/presubmit.yml"
          if [ ! -f "$PRESUBMIT" ]; then
            echo "ERROR: versions/${LLVM_VERSION}/presubmit.yml is required"
            exit 1
          fi
          cp "$PRESUBMIT" redist-repo/.bcr/presubmit.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.llvm_version }}
          path: |
            redist-repo/llvm-project-${{ matrix.version }}.bzl.tar.xz
          retention-days: 7

  test:
    needs: [setup, build]
    if: needs.setup.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: redist-repo

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.llvm_version }}

      - name: Extract artifact
        run: tar -xJf "llvm-project-${{ matrix.version }}.bzl.tar.xz"

      - name: Run presubmit (linux tasks)
        working-directory: redist-repo
        env:
          SOURCE_DIR: ${{ github.workspace }}/llvm-project-${{ matrix.version }}.bzl
        run: |
          set -euo pipefail
          bazel run //tools:run_presubmit -- \
            --presubmit "versions/${{ matrix.llvm_version }}/presubmit.yml" \
            --run-host \
            --source-dir "${SOURCE_DIR}"

  dispatch:
    needs: [build, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect affected versions
        id: detect
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.llvm_version }}" ]; then
            VERSIONS="${{ inputs.llvm_version }}"
          else
            VERSIONS=$(git diff --name-only HEAD~1 -- 'versions/' \
              | grep -oP 'versions/\K[^/]+(?=/)' \
              | sort -uV)
          fi

          if [ -z "$VERSIONS" ]; then
            echo "No version directories changed"
            echo "versions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "versions<<EOF" >> "$GITHUB_OUTPUT"
          echo "$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Affected versions: $VERSIONS"

      - name: Dispatch release
        if: steps.detect.outputs.versions != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r LLVM_VERSION; do
            [ -z "$LLVM_VERSION" ] && continue

            VERSION_FILE="versions/${LLVM_VERSION}/version.txt"
            if [ ! -f "$VERSION_FILE" ]; then
              echo "No version.txt for ${LLVM_VERSION}, skipping"
              continue
            fi

            VERSION=$(tr -d '[:space:]' < "$VERSION_FILE")

            if [ "$VERSION" = "$LLVM_VERSION" ]; then
              echo "Dispatching base release for ${VERSION}"
              gh workflow run release.yaml \
                --repo "${{ github.repository }}" \
                -f llvm_version="${LLVM_VERSION}"
            elif [[ "$VERSION" =~ \.bcr\.([0-9]+)$ ]]; then
              BCR_VERSION="${BASH_REMATCH[1]}"
              echo "Dispatching patched release for ${VERSION}"
              gh workflow run release.yaml \
                --repo "${{ github.repository }}" \
                -f llvm_version="${LLVM_VERSION}" \
                -f bcr_version="${BCR_VERSION}"
            else
              echo "Invalid version '${VERSION}' in ${VERSION_FILE}, skipping"
            fi
          done <<< "${{ steps.detect.outputs.versions }}"
