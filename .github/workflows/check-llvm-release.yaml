name: Check LLVM Release

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version to seed (e.g. 20.1.0). Leave empty to check for latest."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      llvm_version: ${{ steps.resolve.outputs.llvm_version }}
    steps:
      - name: Resolve LLVM version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.llvm_version }}" ]; then
            LLVM_VERSION="${{ inputs.llvm_version }}"
            echo "Using manually specified version: ${LLVM_VERSION}"
          else
            LLVM_RELEASE=$(gh api repos/llvm/llvm-project/releases/latest --jq '{tag: .tag_name, prerelease: .prerelease, draft: .draft}')
            LLVM_TAG=$(echo "$LLVM_RELEASE" | jq -r '.tag')
            IS_PRERELEASE=$(echo "$LLVM_RELEASE" | jq -r '.prerelease')
            IS_DRAFT=$(echo "$LLVM_RELEASE" | jq -r '.draft')

            echo "Latest LLVM release: ${LLVM_TAG} (prerelease=${IS_PRERELEASE}, draft=${IS_DRAFT})"

            if [ "$IS_PRERELEASE" = "true" ] || [ "$IS_DRAFT" = "true" ]; then
              echo "Skipping pre-release or draft"
              echo "llvm_version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            LLVM_VERSION="${LLVM_TAG#llvmorg-}"
          fi

          RELEASE_TAG="llvmorg-${LLVM_VERSION}"
          if gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists in this repo, nothing to do"
            echo "llvm_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "llvm_version=${LLVM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Will prepare release for: ${LLVM_VERSION}"

  prepare:
    needs: check
    if: needs.check.outputs.llvm_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for existing PR
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ needs.check.outputs.llvm_version }}"
          BRANCH="prepare/${LLVM_VERSION}"

          EXISTING=$(gh pr list --repo "${{ github.repository }}" \
            --head "$BRANCH" --state open --json number --jq 'length')

          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists for ${BRANCH}, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap version directory
        if: steps.existing.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ needs.check.outputs.llvm_version }}"
          VERSION_DIR="versions/${LLVM_VERSION}"

          mkdir -p "${VERSION_DIR}"

          if [ ! -f "${VERSION_DIR}/presubmit.yml" ]; then
            cp .bcr/presubmit.yml "${VERSION_DIR}/presubmit.yml"
            echo "Copied template presubmit.yml to ${VERSION_DIR}/"
          else
            echo "presubmit.yml already exists for ${LLVM_VERSION}"
          fi

      - name: Record upstream integrity
        if: steps.existing.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ needs.check.outputs.llvm_version }}"
          VERSION_DIR="versions/${LLVM_VERSION}"
          INTEGRITY_FILE="${VERSION_DIR}/source.sha256"

          if [ -f "$INTEGRITY_FILE" ]; then
            echo "source.sha256 already exists for ${LLVM_VERSION}"
            exit 0
          fi

          TAG="llvmorg-${LLVM_VERSION}"
          TARBALL="llvm-project-${LLVM_VERSION}.src.tar.xz"
          URL="https://github.com/llvm/llvm-project/releases/download/${TAG}/${TARBALL}"

          echo "Downloading ${URL} to compute SHA-256..."
          curl -fSL -o "${TARBALL}" "${URL}"

          SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)
          echo "$SHA256" > "$INTEGRITY_FILE"
          rm -f "${TARBALL}"

          echo "Recorded upstream integrity: ${SHA256}"

      - name: Create PR
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LLVM_VERSION="${{ needs.check.outputs.llvm_version }}"
          BRANCH="prepare/${LLVM_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add "versions/${LLVM_VERSION}/"

          if git diff --cached --quiet; then
            echo "No changes, skipping"
            exit 0
          fi

          git commit -m "Prepare LLVM ${LLVM_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --title "Prepare LLVM ${LLVM_VERSION}" \
            --body "$(cat <<'EOF'
          Bootstraps `versions/${LLVM_VERSION}/` with a template `presubmit.yml`.

          Review and customize the presubmit configuration, then merge to trigger the release.
          EOF
          )"
